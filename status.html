<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Deployment Status — H.A. Models</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #222; display: flex; justify-content: center; padding: 3rem 1rem; }
    .card { max-width: 640px; width: 100%; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 2rem; }
    h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: .25rem; }
    .sub { color: #666; font-size: .85rem; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    td { padding: .5rem .25rem; border-bottom: 1px solid #eee; }
    td:first-child { font-weight: 600; color: #555; width: 140px; }
    td:last-child { font-family: 'SF Mono', 'Fira Code', monospace; word-break: break-all; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .75rem; font-weight: 600; text-transform: uppercase; }
    .badge.on { background: #d4edda; color: #155724; }
    .footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #eee; font-size: .8rem; color: #888; text-align: center; }
    .loading { text-align: center; padding: 2rem; color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔍 Deployment Status</h1>
    <p class="sub">H.A. Models — Vercel deployment metadata</p>
    <div id="status"><div class="loading">Loading…</div></div>
    <div class="footer">This page is <span class="badge on">noindex</span> · data fetched server-side</div>
  </div>
  <script>
    fetch('/api/status')
      .then(r => r.json())
      .then(d => {
        const rows = [
          ['Environment', d.environment],
          ['URL', d.url],
          ['Region', d.region],
          ['Commit SHA', d.commitSha],
          ['Branch', d.commitRef],
          ['Message', d.commitMessage],
          ['Author', d.commitAuthor],
          ['Repo', d.repoOwner + '/' + d.repoSlug],
          ['Deploy Time', d.deployTime ? new Date(d.deployTime).toISOString() : 'N/A'],
          ['Node', d.nodeVersion],
          ['Platform', d.platform],
        ];
        document.getElementById('status').innerHTML =
          '<table>' + rows.map(([k, v]) =>
            '<tr><td>' + k + '</td><td>' + (v || '—') + '</td></tr>'
          ).join('') + '</table>';
      })
      .catch(() => {
        document.getElementById('status').innerHTML = '<p style="color:#c00">Failed to load status.</p>';
      });
  </script>
</body>
</html>
